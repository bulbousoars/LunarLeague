name: lunarleague

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ../apps/api
    restart: unless-stopped
    command: ["serve"]
    environment:
      API_BIND: ${API_BIND:-0.0.0.0}
      API_PORT: ${API_PORT:-8000}
      API_SECRET_KEY: ${API_SECRET_KEY}
      API_LOG_LEVEL: ${API_LOG_LEVEL:-info}
      API_ENV: ${API_ENV:-prod}
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      DATA_PROVIDER: ${DATA_PROVIDER:-sleeper}
      SPORTSDATAIO_API_KEY: ${SPORTSDATAIO_API_KEY:-}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM}
      SMTP_ALLOW_PLAINTEXT: ${SMTP_ALLOW_PLAINTEXT:-false}
      PUBLIC_WEB_URL: ${PUBLIC_WEB_URL}
      PUBLIC_API_URL: ${PUBLIC_API_URL}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:${API_PORT:-8000}/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "${API_PORT:-8000}:${API_PORT:-8000}"

  worker:
    build:
      context: ../apps/api
    restart: unless-stopped
    command: ["worker"]
    environment:
      API_SECRET_KEY: ${API_SECRET_KEY}
      API_LOG_LEVEL: ${API_LOG_LEVEL:-info}
      API_ENV: ${API_ENV:-prod}
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      DATA_PROVIDER: ${DATA_PROVIDER:-sleeper}
      SPORTSDATAIO_API_KEY: ${SPORTSDATAIO_API_KEY:-}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM}
      SMTP_ALLOW_PLAINTEXT: ${SMTP_ALLOW_PLAINTEXT:-false}
      PUBLIC_WEB_URL: ${PUBLIC_WEB_URL}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      disable: true

  web:
    build:
      context: ../apps/web
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: ${WEB_PORT:-3000}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL}
    ports:
      - "${WEB_PORT:-3000}:${WEB_PORT:-3000}"
    depends_on:
      - api
    healthcheck:
      disable: true

volumes:
  postgres_data:
  redis_data:
