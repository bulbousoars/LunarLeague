# Reverse proxy in front of api + web (use with base docker-compose.yml).
# Intended for homelab setups where Traefik (or similar) terminates TLS and reaches
# this VM on HTTP :80. Upstream ports match API_PORT / WEB_PORT in .env.
#
# Usage:
#   docker compose -f deploy/docker-compose.yml -f deploy/docker-compose.caddy.yml --env-file deploy/.env up -d --build

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      API_PORT: ${API_PORT:-8000}
      WEB_PORT: ${WEB_PORT:-3000}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - web

volumes:
  caddy_data:
  caddy_config:
