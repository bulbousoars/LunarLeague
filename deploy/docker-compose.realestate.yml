name: lunarleague

services:
  postgres:
    volumes:
      - type: bind
        source: /mnt/storage/docker/lunarleague/postgres
        target: /var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    volumes:
      - type: bind
        source: /mnt/storage/docker/lunarleague/redis
        target: /data
    deploy:
      resources:
        limits:
          memory: 256M

  api:
    ports:
      - "${API_PORT:-8020}:${API_PORT:-8020}"
    deploy:
      resources:
        limits:
          memory: 512M

  worker:
    deploy:
      resources:
        limits:
          memory: 512M

  web:
    ports:
      - "${WEB_PORT:-3020}:${WEB_PORT:-3020}"
    depends_on:
      api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 768M
