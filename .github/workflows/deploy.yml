# Keeps production (e.g. https://lunarleague.dugganco.com) aligned with this repo.
#
# Triggers:
#   - push to `main` when app or deploy files change
#   - manual: Actions → Deploy production → Run workflow
#
# Repository secrets (Settings → Secrets and variables → Actions):
#   LUNARLEAGUE_SSH_HOST       — VM or host (e.g. 192.168.1.218 or hostname)
#   LUNARLEAGUE_SSH_USER       — SSH user with docker + git access to the clone
#   LUNARLEAGUE_SSH_KEY        — private key PEM (full file, including BEGIN/END)
#   LUNARLEAGUE_DEPLOY_DIR     — absolute path to the **deploy** directory inside
#                                the git repo (must end with .../deploy), e.g.
#                                /mnt/storage/docker/lunarleague/app/deploy
#
# Repository variables (Settings → Secrets and variables → Actions → Variables), optional:
#   LUNARLEAGUE_DEPLOY_BRANCH  — git branch to deploy (default: main)
#   LUNARLEAGUE_COMPOSE_OVERLAY — extra compose file **suffix** without .yml, e.g.
#                                realestate → merges docker-compose.realestate.yml
#
# SSH uses port 22. For another port, use ~/.ssh/config on the runner or fork this workflow.

name: Deploy production

on:
  push:
    branches: [main]
    paths:
      - "apps/**"
      - "deploy/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

concurrency:
  group: lunarleague-deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Git sync + compose rebuild + migrate + health
        uses: appleboy/ssh-action@v1.2.3
        with:
          host: ${{ secrets.LUNARLEAGUE_SSH_HOST }}
          username: ${{ secrets.LUNARLEAGUE_SSH_USER }}
          key: ${{ secrets.LUNARLEAGUE_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            DEPLOY_DIR="${{ secrets.LUNARLEAGUE_DEPLOY_DIR }}"
            REPO_ROOT="$(dirname "$DEPLOY_DIR")"
            BRANCH='${{ vars.LUNARLEAGUE_DEPLOY_BRANCH }}'
            BRANCH="${BRANCH:-main}"
            OVERLAY='${{ vars.LUNARLEAGUE_COMPOSE_OVERLAY }}'

            if [ ! -d "$DEPLOY_DIR" ]; then
              echo "LUNARLEAGUE_DEPLOY_DIR does not exist: $DEPLOY_DIR" >&2
              exit 1
            fi
            if [ "$(basename "$DEPLOY_DIR")" != "deploy" ]; then
              echo "LUNARLEAGUE_DEPLOY_DIR must end with /deploy (got: $DEPLOY_DIR)" >&2
              exit 1
            fi
            if [ ! -d "$REPO_ROOT/.git" ]; then
              echo "No .git at repo root $REPO_ROOT (parent of deploy/). Fix LUNARLEAGUE_DEPLOY_DIR." >&2
              exit 1
            fi

            cd "$REPO_ROOT"
            git fetch origin "$BRANCH"
            git checkout "$BRANCH"
            git reset --hard "origin/$BRANCH"

            cd "$DEPLOY_DIR"
            COMPOSE=(docker compose -f docker-compose.yml --env-file .env)
            if [ -f docker-compose.caddy.yml ]; then
              COMPOSE+=(-f docker-compose.caddy.yml)
            fi
            if [ -n "$OVERLAY" ] && [ -f "docker-compose.${OVERLAY}.yml" ]; then
              COMPOSE+=(-f "docker-compose.${OVERLAY}.yml")
            fi

            "${COMPOSE[@]}" up -d --build --remove-orphans
            "${COMPOSE[@]}" run --rm api migrate up

            API_PORT="$(grep -E '^API_PORT=' .env 2>/dev/null | cut -d= -f2- | tr -d '\r"' | head -1 || true)"
            API_PORT="${API_PORT:-8000}"
            curl -fsS "http://127.0.0.1:${API_PORT}/healthz" >/dev/null
            echo "Deploy OK: healthz passed on :${API_PORT}"
