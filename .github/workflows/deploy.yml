# Run from GitHub: Actions → Deploy production → Run workflow.
# Repo → Settings → Secrets → Actions — create:
#   LUNARLEAGUE_SSH_HOST      — hostname or IP of the VPS
#   LUNARLEAGUE_SSH_USER      — SSH login user
#   LUNARLEAGUE_SSH_KEY       — private key (full PEM, including BEGIN/END lines)
#   LUNARLEAGUE_DEPLOY_DIR    — absolute deploy dir on server (docker-compose.yml + .env)
# Optional:
#   LUNARLEAGUE_DEPLOY_BRANCH — defaults to main when unset
# After secrets exist, you may add `push: branches: [main]` under `on:` for deploy-on-push.
#
# SSH uses port 22. Non-standard port: fork this workflow or use ~/.ssh/config on the runner.

name: Deploy production

on:
  workflow_dispatch:

concurrency:
  group: lunarleague-deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Git pull + Docker Compose rebuild
        uses: appleboy/ssh-action@v1.2.3
        with:
          host: ${{ secrets.LUNARLEAGUE_SSH_HOST }}
          username: ${{ secrets.LUNARLEAGUE_SSH_USER }}
          key: ${{ secrets.LUNARLEAGUE_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            DEPLOY_DIR="${{ secrets.LUNARLEAGUE_DEPLOY_DIR }}"
            BRANCH="${{ secrets.LUNARLEAGUE_DEPLOY_BRANCH }}"
            BRANCH="${BRANCH:-main}"
            cd "$DEPLOY_DIR"
            git fetch origin "$BRANCH"
            git checkout "$BRANCH"
            git reset --hard "origin/$BRANCH"
            docker compose --env-file .env up -d --build --remove-orphans
